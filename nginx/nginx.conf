upstream kensens {
    server app_portfolio_website:8000;
}

server {
    listen 80;
    server_name 13.61.100.110;

    return 301 http://keremboylu.com.tr$request_uri;
}

server {
    listen       80;
    server_name  keremboylu.com.tr www.keremboylu.com.tr;
    server_tokens off;
    client_max_body_size 15M;

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }
}

server {
    listen       80;
    server_name  admin.kensens.com.tr;

    location / {
        proxy_pass http://kensens;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }
}

server {
    listen       80;
    server_name  admin.localhost;

    location / {
        proxy_pass http://kensens;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }
}
