{% load static %}

<!--================Header Menu Area =================-->
<nav id="primary-nav"
     class="fixed top-0 w-full z-50 bg-apple-bg/80 dark:bg-[#121212]/80 backdrop-blur-xl border-b border-black/5 dark:border-white/5 transition-all duration-300">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="{{ public_site_origin }}{% url 'index' %}" class="text-xl font-bold tracking-tight text-apple-dark dark:text-white transition-colors z-10"><span
                data-brand-typing>{{ site_brand_short|default:"KB." }}</span></a>

        <!-- Desktop Menu -->
        <div class="hidden md:flex absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 space-x-12 items-center text-sm font-medium z-10 w-max">
            <a href="{{ public_site_origin }}{% url 'index' %}#home" class="text-apple-dark dark:text-white transition-colors {% if active_nav == 'home' %}opacity-100{% else %}opacity-60 hover:opacity-100{% endif %}">Home</a>
            <a href="{{ public_site_origin }}{% url 'projects' %}"
               class="text-apple-dark dark:text-white transition-colors {% if active_nav == 'projects' %}opacity-100{% else %}opacity-60 hover:opacity-100{% endif %}">Projects</a>
            <a href="{{ public_site_origin }}{% url 'contact' %}"
               class="text-apple-dark dark:text-white transition-colors {% if active_nav == 'contact' %}opacity-100{% else %}opacity-60 hover:opacity-100{% endif %}">Contact</a>
        </div>

        <div class="hidden md:flex items-center gap-3 z-10">
            <div class="relative" data-cv-dropdown>
                <button type="button" data-cv-dropdown-toggle aria-expanded="false" aria-label="Open CV options"
                        class="inline-flex h-10 min-w-10 shrink-0 px-4 items-center justify-center rounded-full bg-black/5 dark:bg-white/10 text-apple-dark dark:text-white text-xs font-bold tracking-wide hover:bg-black/10 dark:hover:bg-white/20 transition-colors">{{ site_nav_cv_label|default:"CV" }}</button>
                <div data-cv-dropdown-menu
                     class="hidden absolute right-0 mt-2 w-44 rounded-2xl border border-black/10 dark:border-white/10 bg-white dark:bg-[#1A1A1A] shadow-apple dark:shadow-2xl p-2">
                    {% for document in documents %}
                        <a href="{{ document.file.url }}" data-cv-popup
                           class="block rounded-xl px-3 py-2 text-sm font-semibold text-apple-dark dark:text-white hover:bg-black/5 dark:hover:bg-white/10 transition-colors">{{ document.button_text }}</a>
                    {% endfor %}

                </div>
            </div>
            <!-- Theme Toggle Switch -->
            <button id="theme-toggle"
                    class="relative w-10 h-10 shrink-0 flex items-center justify-center rounded-full bg-black/5 dark:bg-white/10 text-apple-dark dark:text-white hover:bg-black/10 dark:hover:bg-white/20 transition-colors overflow-hidden">
                <i class="fa-solid fa-moon absolute transition-all duration-300 transform translate-y-0 opacity-100 dark:translate-y-full dark:opacity-0 text-lg"></i>
                <i class="fa-solid fa-sun absolute transition-all duration-300 transform -translate-y-full opacity-0 dark:translate-y-0 dark:opacity-100 text-lg"></i>
            </button>
        </div>

        <!-- Mobile Menu Button -->
        <div class="md:hidden flex items-center gap-4">
            <div class="relative" data-cv-dropdown>
                <button type="button" data-cv-dropdown-toggle aria-expanded="false" aria-label="Open CV options"
                        class="inline-flex h-10 min-w-10 shrink-0 px-4 items-center justify-center rounded-full bg-black/5 dark:bg-white/10 text-apple-dark dark:text-white text-xs font-bold tracking-wide transition-colors">{{ site_nav_cv_label|default:"CV" }}</button>
                <div data-cv-dropdown-menu
                     class="hidden absolute right-0 mt-2 w-44 rounded-2xl border border-black/10 dark:border-white/10 bg-white dark:bg-[#1A1A1A] shadow-apple dark:shadow-2xl p-2">
                    {% for document in documents %}
                        <a href="{{ document.file.url }}" data-cv-popup
                           class="block rounded-xl px-3 py-2 text-sm font-semibold text-apple-dark dark:text-white hover:bg-black/5 dark:hover:bg-white/10 transition-colors">{{ document.button_text }}</a>
                    {% endfor %}
                </div>
            </div>
            <button id="theme-toggle-mobile"
                    class="relative w-10 h-10 shrink-0 flex items-center justify-center rounded-full bg-black/5 dark:bg-white/10 text-apple-dark dark:text-white transition-colors overflow-hidden">
                <i class="fa-solid fa-moon absolute transition-all duration-300 transform translate-y-0 opacity-100 dark:translate-y-full dark:opacity-0 text-lg"></i>
                <i class="fa-solid fa-sun absolute transition-all duration-300 transform -translate-y-full opacity-0 dark:translate-y-0 dark:opacity-100 text-lg"></i>
            </button>
            <button type="button"
                    class="text-apple-dark dark:text-white text-xl h-10 w-10 inline-flex items-center justify-center rounded-full bg-black/5 dark:bg-white/10 transition-colors"
                    aria-label="Open navigation menu"
                    aria-expanded="false"
                    aria-controls="mobile-menu"
                    data-mobile-menu-toggle>
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </div>

    <div id="mobile-menu"
         class="hidden md:hidden border-t border-black/5 dark:border-white/5 bg-apple-bg/95 dark:bg-[#121212]/95 backdrop-blur-xl"
         data-mobile-menu>
        <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col gap-2">
            <a href="{{ public_site_origin }}{% url 'index' %}#home"
               class="rounded-xl px-4 py-3 text-sm font-bold text-apple-dark dark:text-white bg-black/5 dark:bg-white/10 transition-colors"
               data-mobile-menu-link>Home</a>
            <a href="{{ public_site_origin }}{% url 'projects' %}"
               class="rounded-xl px-4 py-3 text-sm font-bold text-apple-dark dark:text-white bg-black/5 dark:bg-white/10 transition-colors"
               data-mobile-menu-link>Projects</a>
            <a href="{{ public_site_origin }}{% url 'contact' %}"
               class="rounded-xl px-4 py-3 text-sm font-bold text-apple-dark dark:text-white bg-black/5 dark:bg-white/10 transition-colors"
               data-mobile-menu-link>Contact</a>
        </div>
    </div>
</nav>

<!--================Header Menu Area =================-->
