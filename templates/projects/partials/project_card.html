<article class="group relative rounded-3xl overflow-hidden shadow-apple dark:shadow-2xl border border-black/5 dark:border-white/5 hover:shadow-apple-hover bg-white dark:bg-[#1A1A1A] flex flex-col transition-all duration-500" style="font-style: normal;">
    <a href="{{ project.get_absolute_url }}" class="block aspect-[16/9] bg-gray-100 dark:bg-[#222] relative overflow-hidden">
        <img src="{{ project.cover_image.url }}" alt="{{ project.title }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
    </a>

    <div class="p-6 translate-z-10 flex-1 flex flex-col" style="font-style: normal;">
        <div class="flex justify-between items-start gap-3 mb-3">
            <h3 class="min-w-0 flex-1 text-xl font-bold text-apple-dark dark:text-white transition-colors leading-tight" style="font-style: normal;">{{ project.title }}</h3>
            {% if project.category %}
                <span class="max-w-[48%] shrink-0 px-3 py-1 bg-black/5 dark:bg-white/10 rounded-full text-[10px] font-bold text-apple-dark dark:text-white uppercase tracking-wider truncate" style="font-style: normal !important;">
                    {{ project.category.name }}
                </span>
            {% endif %}
        </div>

        <p class="text-[14px] text-apple-dark/70 dark:text-white/70 mb-6 transition-colors flex-1 leading-relaxed overflow-hidden" style="font-style: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
            {{ project.summary }}
        </p>

        <div class="flex gap-3 mt-auto">
            <a href="{{ project.get_absolute_url }}" class="px-4 py-2 rounded-full bg-apple-dark dark:bg-apple-blue text-white text-[13px] font-semibold hover:scale-105 transition-transform shadow-md" style="font-style: normal;">View</a>
            {% for link in project.hero_links.all %}
                {% if forloop.first %}
                    <a href="{{ link.url }}" target="_blank" rel="noopener noreferrer" class="px-4 py-2 rounded-full bg-black/5 dark:bg-white/10 text-apple-dark dark:text-white text-[13px] font-semibold hover:bg-black/10 dark:hover:bg-white/20 transition-colors" style="font-style: normal;">{{ link.label }}</a>
                {% endif %}
            {% endfor %}
        </div>
    </div>
</article>
